name: HoopSense CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  rust-core:
    name: Rust Core (Logic & Spatial)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Rust Format Check
        run: cd core && cargo fmt --all -- --check
      - name: Rust Unit Tests
        run: cd core && cargo test

  python-perception:
    name: Python Perception & ML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 pytest numpy pyyaml torch
      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
      - name: Python Unit Tests
        run: python -m pytest tests/test_behavior.py tests/test_geometry.py
      - name: Contract Validation
        run: python -s tests/validate_contract.py

  perception-gate:
    name: Perception Readiness Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install Audit Deps
        run: |
          python -m pip install --upgrade pip
          pip install numpy pyyaml torch opencv-python-headless ultralytics
      - name: Run Perception Audit
        run: bash scripts/run_perception_audit.sh
