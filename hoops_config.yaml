# HoopSense Execution Config
project_name: "HoopSense MVP"
video_source: "local" 
gdrive_video_path: ""
local_video_path: "data/sample.mp4"
output_dir: "data/outputs"

runtime:
  accelerator: "T4" # Verified at runtime
  packages:
    - "ultralytics"
    - "easyocr"
    - "opencv-python-headless"
    - "pyyaml"

perception:
  model: "yolov8n-pose.pt"
  ocr_buffer_size: 30
  conf_threshold: 0.5
