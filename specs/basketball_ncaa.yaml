# HoopSense DSL: NCAA Basketball Specification v1.0
league: "NCAA"
units: "metric"

global_states:
  - id: "offense"
    trigger: "possession_active"
  - id: "defense"
    trigger: "possession_inactive"

rules:
  - id: "jump_shot"
    type: "kinematic"
    preconditions:
      - actor: "self"
        team_state: "offense"
        state: "has_possession"
...
  - id: "block"
    type: "kinematic"
    preconditions:
      - actor: "self"
        team_state: "defense"
    predicates:
      - joint: "wrist"
        metric: "pos_z"
        operator: "intersects"
        reference: "ball_trajectory"

      - joint: "hips"
        metric: "velocity_z"
        operator: ">"
        threshold: 0.02
      - joint: "wrists"
        metric: "pos_y"
        operator: "<"
        reference: "head"
    window_ms: 500

  - id: "point_3"
    type: "geometric"
    preconditions:
      - event: "made_basket"
    conditions:
      - distance_from: "rim"
        operator: ">"
        threshold: 675.0 # cm

  - id: "euro_step"
    type: "kinematic"
    preconditions:
      - actor: "self"
        state: "has_possession"
    phases:
      - id: "entry_step"
        predicates:
          - joint: "hips"
            metric: "velocity_x"
            operator: "<"
            threshold: -0.04
      - id: "cross_step"
        predicates:
          - joint: "hips"
            metric: "velocity_x"
            operator: ">"
            threshold: 0.04
    constraints:
      - joint: "torso"
        metric: "velocity_y"
        operator: ">"
        threshold: 0.02
    window_ms: 800

  - id: "violation_traveling"
    type: "violation"
    predicates:
      - joint: "ankles"
        metric: "ground_contact_count"
        operator: ">"
        threshold: 2
      - context: "possession"
        status: "active"
    window_ms: 1000
