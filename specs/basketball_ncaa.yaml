# HoopSense DSL: Comprehensive NCAA Basketball Specification
league: "NCAA"
version: "2.0.0-full"

categories:
  - id: "possession_events"
    rules: ["shot_attempt", "made_shot", "missed_shot", "pass", "catch", "dribble", "pickup", "turnover", "steal", "rebound", "oreb", "dreb", "block", "assist"]
  
  - id: "shot_subtypes"
    rules: ["free_throw", "layup", "floater", "pull_up", "catch_and_shoot", "step_back", "dunk", "tip_in", "hook_shot", "3pt_attempt", "2pt_attempt"]

  - id: "ball_states"
    rules: ["ball_released", "ball_received", "ball_loose", "ball_controlled", "ball_out_of_bounds"]

  - id: "defensive_events"
    rules: ["contest", "help_defense", "closeout", "deflection", "screen_nav", "switch", "double_team"]

  - id: "violations"
    rules: ["travel", "double_dribble", "carry", "kick_ball", "foul", "shooting_foul", "offensive_foul", "timeout", "substitution"]

rules:
  # --- CORE KINEMATIC EXAMPLES (Full library to be expanded in Oracle) ---
  - id: "step_back"
    type: "kinematic"
    predicates:
      - joint: "hips"
        metric: "velocity_y" # Moving away from rim
        operator: "<"
        threshold: -0.05
      - transition: "jump_shot"

  - id: "dunk"
    type: "geometric"
    conditions:
      - joint: "wrists"
        metric: "pos_z"
        operator: ">"
        reference: "rim_height"
      - ball_state: "controlled"

  - id: "travel"
    type: "violation"
    predicates:
      - joint: "ankles"
        metric: "steps_since_dribble"
        operator: ">"
        threshold: 2

# --- REJECTION POLICY ---
# Every rule MUST map to a unique ID in the Action Brain classification head.
