meta:
  project: HoopSense
  lifecycle: requirements-first SDLC
  strategy: breadth-first with MVP-first frontiers
  branching_rule: "each expanded parent should usually have 3-5 children"
  leaf_rule: "leaf node must be implementable, testable, and reviewable"
  confidence_gate: "advance the frontier only when the current slice is validated"
  source_requirements: docs/plan/REQUIREMENTS.md
  supporting_docs:
    - docs/architecture/components/LAYERED_FEATURE_SCHEMA.md
    - docs/architecture/components/FEATURE_SCHEMA_V2.md
    - docs/plan/MVP_STATS_CONTRACT.md
    - docs/architecture/devops/MLOPS.md
    - docs/architecture/devops/DEVOPS.md
    - TASK_STATUS.md
  last_updated: "2026-03-31"

