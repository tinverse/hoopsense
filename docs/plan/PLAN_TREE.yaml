  rationale:
    - Anchor the near-term product scope to a normalized customer-facing scorebook contract before deeper model expansion.
    - Make the MVP headers, formulas, and validation rules explicit repo artifacts instead of leaving them implicit in external files.
    - Require event and possession coverage to be justified against the sellable scorebook, not against generic basketball labels.
    - Reuse the declarative rules-engine idea from the sibling project only as architecture guidance, not as shared implementation.
    - Make calibration workable on real youth-gym footage where corners, center line, and near sideline visibility are often missing.
    - Prefer calibration primitives that match how reviewers actually see the court: arbitrary samples along visible lines and arcs, not precise named court points.
    - Use motion-aware track smoothing as a Layer 1 postprocess signal before expanding to heavier live-play gating or tracker rewrites.
    - Make review feedback robust enough that multi-frame reviewer observations are not lost when they do not map cleanly to a single error button.
    - Convert qualitative review notes into a reusable regression fixture before treating them as training signal.
    - Use the reviewed regression cases as an audit surface, not as clip-specific exception rules.
    - Improve player-track quality at the Layer 1 artifact stage before expanding downstream possession and stats logic.
    - Align task tracking with the actual architecture before more feature work lands.
    - Put dataset and checkpoint governance in place before scaling training complexity.
    - Make the build and delivery story explicit before environment drift deepens.
    - Make dataset lineage and container-target boundaries explicit before additional platform complexity lands.
    - Keep CI cost-effective by isolating cores and gating training-heavy workflows.
    - Add Terraform only for the stable shared cloud layer, not for still-fluid experiments.
    - Do not expand Action Brain work materially until the perception-and-geometry readiness gate is explicit.
    - Expand the Oracle only after the MVP contract stays stable.
    - Introduce possession context before attempting stats generation.
    - Keep deployment guidance separated by platform to avoid environment drift.
