priorities:
  current_frontier:
    - L3.17
    - L3.18
    - L3.19
    - L3.4
    - L3.9
    - L3.10
    - L3.12
    - L3.15
    - L3.20
  rationale:
    - Align task tracking with the actual architecture before more feature work lands.
    - Put dataset and checkpoint governance in place before scaling training complexity.
    - Expand the Oracle only after the MVP contract stays stable.
    - Introduce possession context before attempting stats generation.
    - Keep deployment guidance separated by platform to avoid environment drift.
