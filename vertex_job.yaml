# HoopSense Vertex AI Custom Job Specification
workerPoolSpecs:
  - machineSpec:
      machineType: n1-standard-4
      acceleratorType: NVIDIA_TESLA_T4
      acceleratorCount: 1
    replicaCount: 1
    containerSpec:
      imageUri: gcr.io/hoopsense-ai/hoopsense-engine:latest
      # The entrypoint script will handle training and data sync
      args:
        - "tools/training/train_action_brain.py"
